edition = 4

[agent]
name = "verifier-agent"
version = "0.1.0"
description = "Independent delivery verifier for the paid market. Re-checks the delivered payload's content hash and structure and replies VERIFIED pass|fail. The buyer gates escrow release on the verdict."
summary = "Verifies deliveries - release is gated on its verdict."
readme = "On VERIFY round=<n> sha=<hash> service=<s> arg=<a> payload=<raw>, replies VERIFIED round=<n> verdict=pass|fail. Holds no keys, moves no funds."

[agent.license]
type = "spdx"
expression = "MIT"

[options]
AGENT_NAME = { type = "string", default = "verifier-agent", description = "Market identity for this verifier" }
TRACE = { type = "string", default = "", description = "Set to 1 for verbose logs" }

# Run as a container (coral-server in Docker launches it via the Docker socket).
[runtimes.docker]
image = "verifier-agent:0.1.0"

# Run directly (used when coral-server runs on the host).
[runtimes.executable]
path = "node"
arguments = ["dist/index.js"]

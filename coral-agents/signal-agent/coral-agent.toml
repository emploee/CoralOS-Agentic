edition = 4

[agent]
name = "signal-agent"
version = "0.1.0"
description = "Polls the TxODDS proxy board, detects new fixtures and sharp odds moves, and queues research WANTs. A Coral-native replacement for hand-running research/watcher.ts: it joins the session (visible in Coral Console) and bounds its poll loop with the agent-runtime safety framework (BudgetGuard + StepCounter)."
summary = "Live odds-move detector — feeds the research market's event-driven buyer."
readme = "Serves GET /next, /queue, /api/health on PORT (compatible with the research watcher's contract). Posts a SIGNAL line to its own Coral thread on every detection so it is visible on the bus, not just in its HTTP queue. Never holds a wallet and moves no funds."

[agent.license]
type = "spdx"
expression = "MIT"

[runtimes.docker]
image = "signal-agent:0.1.0"

# Run directly on the host (recommended today — see this package's README for why).
[runtimes.executable]
path = "node"
arguments = ["dist/index.js"]

[options.PROXY_BASE]
type = "string"
description = "TxODDS proxy base URL. Use http://host.docker.internal:8801 when this runs in Docker against a host-run proxy."

[options.POLL_MS]
type = "string"
description = "Poll interval in ms. Defaults to 15000."

[options.MOVE_PCT]
type = "string"
description = "Minimum implied-probability delta (percentage points) to flag as an odds-move. Defaults to 5."

[options.PORT]
type = "string"
description = "HTTP port serving /next, /queue, /api/health. Defaults to 4600."

[options.RESEARCH_BUDGET_SOL]
type = "string"
description = "Optional per-event budget hint attached to /next responses."

[options.SIGNAL_MAX_TOOL_CALLS]
type = "string"
description = "BudgetGuard tool-call cap (one board fetch per poll cycle counts as one). Defaults to 2000."

[options.SIGNAL_MAX_DURATION_SECS]
type = "string"
description = "BudgetGuard session-duration cap in seconds. Defaults to 21600 (6h)."

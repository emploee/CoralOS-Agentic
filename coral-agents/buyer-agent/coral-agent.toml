# Agent manifest — coral-server reads this to discover, launch, and configure the agent.
# Docs: https://docs.coralos.ai/reference/agent · [options] table
# https://docs.coralos.ai/reference/agent/tables/options · docker runtime
# https://docs.coralos.ai/reference/agent/tables/runtimes/docker · whole-kit walkthrough /CORAL.md
edition = 4

[agent]
name = "buyer-agent"
version = "0.1.0"
description = "Marketplace buyer. Broadcasts a WANT, collects competing bids, picks best value, and settles verified outcomes through PatchBond escrow."
summary = "Autonomous TypeScript buyer that runs a repair market and uses a policy signer for devnet escrow."
readme = "Market loop: WANT -> BIDs -> AWARD -> DEPOSITED -> DELIVERED -> VERIFIED -> RELEASED/REFUNDED."

[agent.license]
type = "spdx"
expression = "MIT"

[options]
SIGNER_URL = { type = "string", default = "", description = "Non-secret policy signer sidecar URL; supports devnet escrow deposit/release/refund without exposing the buyer key" }
AGENT_NAME = { type = "string", default = "buyer-agent", description = "Market identity (matches the registry name)" }
SETTLEMENT_RAIL = { type = "string", default = "x402", description = "Buyer settlement rail: x402 or escrow; PatchBond requires escrow" }
SELLER_WALLET = { type = "string", default = "", description = "Expected seller payout wallet - the buyer binds the payment seller= to it before paying (F3)" }
BUYER_MAX_SOL = { type = "f64", default = 0.001, description = "Budget cap per round (the WANT budget)" }
BUYER_SERVICE = { type = "string", default = "txline", description = "Service to shop for (sellers self-select on it)" }
BUYER_ARG = { type = "string", default = "edge 18175397", description = "Argument passed to the winning seller's deliverService" }
BUYER_ARGS = { type = "string", default = "", description = "Comma-separated args to rotate through, one per round (overrides BUYER_ARG)" }
MARKET_SELLERS = { type = "string", default = "seller-agent", description = "Comma-separated seller names in the market thread" }
BID_WINDOW_MS = { type = "f64", default = 5000, description = "How long to collect competing bids each round" }
CYCLE_INTERVAL_MS = { type = "f64", default = 30000, description = "Delay between market rounds" }
SOLANA_RPC_URL = { type = "string", default = "", description = "Solana RPC URL (devnet)" }
VERIFIER_AGENT = { type = "string", default = "", description = "Name of the independent verifier agent; when set, its VERIFIED verdict is recorded (informational - the x402 payment already settled, so it feeds reputation, not release)" }
VERIFY_WINDOW_MS = { type = "f64", default = 20000, description = "How long to wait for the verifier's verdict" }
VERIFY_GATE_ENABLED = { type = "string", default = "0", description = "Set to 1 to skip escalation for sellers with a clean, established record" }
WANT_FEED_URL = { type = "string", default = "", description = "Event mode: poll this URL for the next job instead of rotating BUYER_ARGS" }
POLICY_MAX_SOL_PER_ROUND = { type = "f64", default = 0, description = "Spend cap per payment in SOL (0/unset = the round budget)" }
POLICY_MAX_SOL_PER_SESSION = { type = "f64", default = 0, description = "Cumulative session spend cap in SOL (unset = uncapped)" }
POLICY_SERVICES = { type = "string", default = "", description = "Service allowlist for payments, csv (unset = the BUYER_SERVICE)" }
POLICY_MIN_INTERVAL_MS = { type = "f64", default = 0, description = "Minimum ms between payments (unset = no rate limit)" }
REPUTATION_URL = { type = "string", default = "", description = "The feed's /api/reputation - per-seller track record from the run ledger, weighed at award time" }
TRACE = { type = "string", default = "", description = "Set to 1 to log CoralOS calls + on-chain steps (Explorer links)" }

[runtimes.docker]
image = "buyer-agent:0.1.0"

# Research-market persona: the statistical-model specialist. Reuses the seller-agent image;
# sells the verified TxLINE read framed around model-vs-market disagreement.
edition = 4

[agent]
name = "seller-stats"
version = "0.1.0"
description = "Research marketplace seller - statistical-model specialist. Bids on txline research WANTs; delivers the verified fair-line read with a model-based framing."
summary = "Model-vs-market reads - premium, slower, cites the numbers."
readme = "Bids in the shared market thread on `txline` WANTs (the research watcher queues them on odds moves); delivers the verified TxLINE edge read. Same image as seller-agent; persona + floor shape it."

[agent.license]
type = "spdx"
expression = "MIT"

[options]
SELLER_WALLET = { type = "string", description = "Devnet wallet pubkey that receives payments" }
AGENT_NAME = { type = "string", default = "seller-stats", description = "Market identity (matches the registry name)" }
SERVICES = { type = "string", default = "txline", description = "Inventory - verified TxODDS reads" }
FLOOR_SOL = { type = "f64", default = 0.0006, description = "Cost floor - the model work prices at a premium" }
PERSONA = { type = "string", default = "a quantitative modeller who compares implied probabilities to a Poisson baseline and only claims edges the numbers support", description = "Bidding persona (LLM system prompt)" }
SOLANA_RPC_URL = { type = "string", default = "", description = "Solana RPC URL (devnet)" }
SETTLEMENT_MODE = { type = "string", default = "arbiter", description = "arbiter (default) | direct legacy base escrow" }
ESCROW_DEADLINE_SECS = { type = "f64", default = 600, description = "Refund deadline for escrow deposits (seconds)" }
TXLINE_API_KEY = { type = "string", default = "", description = "Activated TxLINE API token" }
TXLINE_BASE_URL = { type = "string", default = "", description = "Override the TxLINE host" }
ANTHROPIC_API_KEY = { type = "string", default = "", description = "Anthropic key for bids + reads" }
OPENAI_API_KEY = { type = "string", default = "", description = "OpenAI key; set LLM_PROVIDER=openai to use it" }
VENICE_API_KEY = { type = "string", default = "", description = "Venice AI key (OpenAI-compatible, free credits); set LLM_PROVIDER=venice to use it" }
LLM_PROVIDER = { type = "string", default = "", description = "anthropic (default) | openai | venice" }
LLM_MODEL = { type = "string", default = "", description = "Override the LLM model id" }
TRACE = { type = "string", default = "", description = "Set to 1 to log settlement checks" }

[runtimes.docker]
image = "seller-agent:0.1.0"

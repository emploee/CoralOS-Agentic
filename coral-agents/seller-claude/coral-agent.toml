# Freelancer-market persona: the Claude Code harness seller. Uses the seller-agent-claude image
# (Dockerfile.claude - the base seller image + the Claude Code CLI); orders run headless in an
# isolated workdir via the claude-code harness adapter. The harness produces artifacts; the agent
# keeps the wallet.
edition = 4

[agent]
name = "seller-claude"
version = "0.1.0"
description = "Freelance marketplace seller backed by the Claude Code harness. Bids on freelance WANTs; funded orders run `claude -p` headless in an isolated workdir."
summary = "A real coding harness as an economic actor - multi-step work, hash-bound delivery."
readme = "Bids in the shared market thread when the WANT is a `freelance` service; on a funded escrow the claude-code adapter runs the order in a fresh workdir and delivers the hash-bound result. Needs ANTHROPIC_API_KEY at runtime."

[agent.license]
type = "spdx"
expression = "MIT"

[options]
SELLER_WALLET = { type = "string", description = "Devnet wallet pubkey that receives payments" }
AGENT_NAME = { type = "string", default = "seller-claude", description = "Market identity (matches the registry name)" }
SERVICES = { type = "string", default = "freelance", description = "Inventory - this persona sells freelance work" }
FLOOR_SOL = { type = "f64", default = 0.0006, description = "Cost floor - agentic multi-turn work costs more than one LLM call" }
PERSONA = { type = "string", default = "a thorough freelance engineer agent running a real coding harness; slower, deeper, tested work", description = "Bidding persona (LLM system prompt)" }
SOLANA_RPC_URL = { type = "string", default = "", description = "Solana RPC URL (devnet)" }
SETTLEMENT_MODE = { type = "string", default = "arbiter", description = "arbiter (default) | direct legacy base escrow" }
ESCROW_DEADLINE_SECS = { type = "f64", default = 600, description = "Refund deadline for escrow deposits (seconds)" }
HARNESS = { type = "string", default = "claude-code", description = "The harness doing the work (packages/harness-runtime)" }
HARNESS_TIMEOUT_MS = { type = "f64", default = 300000, description = "Kill a harness order after this long" }
CLAUDE_CODE_MAX_TURNS = { type = "string", default = "6", description = "Agentic turn budget per order" }
ANTHROPIC_API_KEY = { type = "string", default = "", description = "REQUIRED at runtime - headless `claude -p` authenticates with it (also drives bids)" }
OPENAI_API_KEY = { type = "string", default = "", description = "OpenAI key for the bidder; set LLM_PROVIDER=openai to use it" }
VENICE_API_KEY = { type = "string", default = "", description = "Venice AI key for the bidder; set LLM_PROVIDER=venice to use it" }
LLM_PROVIDER = { type = "string", default = "", description = "anthropic (default) | openai | venice" }
LLM_MODEL = { type = "string", default = "", description = "Override the LLM model id" }
TRACE = { type = "string", default = "", description = "Set to 1 to log settlement checks + harness events" }

[runtimes.docker]
image = "seller-agent-claude:0.1.0"
